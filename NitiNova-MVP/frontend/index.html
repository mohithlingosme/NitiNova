<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NitiNova MVP - Legal Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ NitiNova MVP</h1>
            <p>Legal Citation Verification</p>
        </header>
        
        <main>
            <form id="queryForm" class="search-form">
                <input type="text" id="queryInput" placeholder="e.g., What is Basic Structure Doctrine?" required>
                <button type="submit">Verify Citations</button>
            </form>
            
            <div id="loading" class="loading hidden">
                Verifying citations...
            </div>
            
            <div id="error" class="error hidden"></div>
            
            <div id="results" class="results hidden">
                <div id="answer"></div>
                <div id="confidence"></div>
                <div id="citations"></div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
