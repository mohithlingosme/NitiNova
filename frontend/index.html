<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NitiNova</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>NitiNova</h1>
    <p class="muted">Ask a legal question. Answers come from the local case JSON.</p>
    <textarea id="query" placeholder="What is personal liberty under Article 21?"></textarea>
    <button id="askBtn">Ask</button>

    <section id="result" class="card hidden">
      <h2>Answer</h2>
      <p id="answer"></p>

      <h3>Supporting Cases</h3>
      <ul id="cases"></ul>

      <h3>Verification</h3>
      <p id="verification"></p>
    </section>
    <p id="status" class="muted"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
