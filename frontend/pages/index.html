<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NitiNova — Verified Legal Search</title>
  <style>
    :root {
      --bg: #0d111f;
      --panel: #10182d;
      --accent: #3fd5c9;
      --accent-2: #ff8c42;
      --text: #e8eef7;
      --muted: #9fb3c8;
      --danger: #ff4d4f;
      --warn: #f7c948;
      --success: #52c41a;
      --radius: 14px;
      --shadow: 0 18px 40px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Space Grotesk","Segoe UI",system-ui,-apple-system,sans-serif;
      background: radial-gradient(110% 110% at 15% 10%, rgba(63,213,201,0.12), transparent),
                  radial-gradient(120% 120% at 80% 0%, rgba(255,140,66,0.14), transparent),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header { padding: 24px 32px; display:flex; align-items:center; justify-content:space-between; }
    .brand { font-weight: 800; letter-spacing: 0.06em; }
    .pill { padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,0.06); color: var(--muted); font-size: 14px;}
    main { display:grid; grid-template-columns:2fr 1fr; gap:24px; padding:0 32px 40px; }
    @media(max-width: 980px){ main { grid-template-columns:1fr; } }
    .card { background: var(--panel); border:1px solid rgba(255,255,255,0.05); border-radius: var(--radius); box-shadow: var(--shadow); padding:22px; }
    textarea {
      width:100%; min-height:180px; background:#0c1428; color:var(--text); border:1px solid rgba(255,255,255,0.08); border-radius: var(--radius);
      padding:14px; font-size:16px; resize:vertical; line-height:1.5;
    }
    button {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color:#0b1021; border:none; border-radius:12px; padding:12px 18px; font-weight:700; cursor:pointer; transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 12px 30px rgba(63,213,201,0.24);
    }
    button:active { transform: translateY(1px); }
    button.secondary { background: rgba(255,255,255,0.08); color: var(--text); box-shadow:none; }
    label { display:block; color:var(--muted); margin-bottom:8px; font-size:14px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    input, select {
      background:#0c1428; color:var(--text); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:10px 12px; min-width:0;
    }
    .result { margin-bottom:14px; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:600;}
    .badge.green { background: rgba(82,196,26,0.15); color:#9fe97c; }
    .badge.yellow { background: rgba(247,201,72,0.18); color:#f7c948; }
    .badge.red { background: rgba(255,77,79,0.2); color:#ff9b9d; }
    .muted { color:var(--muted); font-size:14px; }
    .section-title { font-size:16px; font-weight:700; margin:20px 0 10px; }
    .citation-card { padding:12px 14px; border:1px solid rgba(255,255,255,0.08); border-radius:12px; margin-bottom:10px; background:#0c1428;}
    .loader { display:none; }
    .metrics { display:flex; gap:16px; flex-wrap:wrap; margin:10px 0; }
    .metric { background:#0c1428; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); }
    progress { width:100%; height:10px; border-radius:999px; overflow:hidden; background:#0c1428; }
    progress::-webkit-progress-bar { background:#0c1428; }
    progress::-webkit-progress-value { background:var(--accent); }
  </style>
</head>
<body>
  <header>
    <div class="brand">NitiNova</div>
    <div class="pill" id="auth-status">Guest mode</div>
  </header>

  <main>
    <section class="card">
      <h2>Ask a legal question</h2>
      <p class="muted">Verified answers with citation scoring. Max 2000 chars.</p>
      <label for="query">Query</label>
      <textarea id="query" maxlength="2000" placeholder="e.g., Can the Supreme Court reopen a concluded SLP after dismissal?"></textarea>
      <div class="row">
        <div>
          <label for="jurisdiction">Jurisdiction</label>
          <select id="jurisdiction">
            <option value="">Any</option>
            <option value="india">India</option>
          </select>
        </div>
        <div>
          <label for="yearStart">Year range</label>
          <div class="row">
            <input id="yearStart" type="number" placeholder="1950" style="width:90px">
            <input id="yearEnd" type="number" placeholder="2025" style="width:90px">
          </div>
        </div>
      </div>
      <div style="margin-top:14px;" class="row">
        <button id="btnSubmit">Submit query</button>
        <div class="loader" id="loader">Working…</div>
      </div>
      <p class="muted" id="status"></p>
    </section>

    <section class="card">
      <h3>Sign in</h3>
      <div class="row">
        <input id="email" type="email" placeholder="email">
        <input id="password" type="password" placeholder="password">
        <button id="btnLogin">Login</button>
        <button id="btnRegister" class="secondary">Register</button>
      </div>
      <p class="muted">Tokens are stored in-memory for this demo; persist securely for production.</p>
    </section>
  </main>

  <section class="card" style="margin:0 32px 40px;">
    <h3>Result</h3>
    <div class="metrics">
      <div class="metric">Overall confidence: <span id="overallConf">-</span></div>
      <div class="metric">Processing time: <span id="procTime">-</span></div>
      <div class="metric">Unverified citations: <span id="unverified">-</span></div>
    </div>
    <div id="answer" class="result muted">No query submitted yet.</div>
    <div class="row" style="margin:10px 0;">
      <button id="btnCopyAnswer" class="secondary">Copy answer</button>
      <button id="btnCopyCitations" class="secondary">Copy citations</button>
    </div>
    <div id="citations"></div>
  </section>

  <script>
    const apiBase = "/api";
    let accessToken = null;
    let refreshToken = null;

    const statusEl = document.getElementById("status");
    const loader = document.getElementById("loader");
    const answerEl = document.getElementById("answer");
    const citationsEl = document.getElementById("citations");
    const authStatus = document.getElementById("auth-status");

    function setLoading(isLoading) {
      loader.style.display = isLoading ? "inline-block" : "none";
      document.getElementById("btnSubmit").disabled = isLoading;
    }

    async function api(path, method="GET", body=null, useAuth=true) {
      const headers = {"Content-Type":"application/json"};
      if (useAuth && accessToken) headers["Authorization"] = `Bearer ${accessToken}`;
      const res = await fetch(apiBase + path, {method, headers, body: body ? JSON.stringify(body): undefined});
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      return res.json();
    }

    async function handleLogin(isRegister=false){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if(!email || !password){ alert("Email and password required"); return; }
      const path = isRegister ? "/auth/register" : "/auth/login";
      try{
        const data = await api(path,"POST",{email,password}, false);
        accessToken = data.access_token; refreshToken = data.refresh_token;
        authStatus.textContent = `Signed in as ${email}`;
        authStatus.style.color = "var(--accent)";
        statusEl.textContent = "Authenticated.";
      }catch(err){ alert(err.message); }
    }

    async function submitQuery(){
      const query = document.getElementById("query").value.trim();
      if(query.length < 3){ alert("Query too short"); return; }
      const yearStart = document.getElementById("yearStart").value;
      const yearEnd = document.getElementById("yearEnd").value;
      const year_range = yearStart && yearEnd ? [parseInt(yearStart), parseInt(yearEnd)] : null;
      setLoading(true);
      statusEl.textContent = "Submitting…";
      try{
        const res = await api("/query","POST",{query, jurisdiction: document.getElementById("jurisdiction").value || null, year_range});
        renderResult(res);
        statusEl.textContent = `Done in ${res.processing_time_ms} ms`;
      }catch(err){
        statusEl.textContent = err.message;
      }finally{ setLoading(false); }
    }

    function renderResult(res){
      answerEl.textContent = res.answer;
      document.getElementById("overallConf").textContent = res.overall_confidence?.toFixed(2) ?? "-";
      document.getElementById("procTime").textContent = `${res.processing_time_ms ?? "-"} ms`;
      document.getElementById("unverified").textContent = res.unverified_count ?? "-";
      citationsEl.innerHTML = "";
      res.citations.forEach(c=>{
        const badgeClass = c.match_type === "verified" ? "green" : c.match_type === "partial" ? "yellow" : "red";
        const div = document.createElement("div");
        div.className = "citation-card";
        div.innerHTML = `<div class="row" style="justify-content:space-between;align-items:center;">
          <div><strong>${c.case_name || "Unknown case"}</strong><br><span class="muted">${c.citation || c.raw}</span></div>
          <span class="badge ${badgeClass}">${c.match_type || "unknown"} · ${(c.score||0).toFixed(2)}</span>
        </div>
        <div class="muted">Court: ${c.court || "-"} | Date: ${c.date || "-"}</div>
        <progress max="1" value="${c.score || 0}"></progress>`;
        citationsEl.appendChild(div);
      });
    }

    function copyAnswer(){
      navigator.clipboard.writeText(answerEl.textContent || "");
      statusEl.textContent = "Answer copied.";
    }

    function copyCitations(){
      const text = Array.from(citationsEl.querySelectorAll(".citation-card")).map(div=>div.innerText).join("\\n\\n");
      navigator.clipboard.writeText(text || "");
      statusEl.textContent = "Citations copied.";
    }

    document.getElementById("btnSubmit").addEventListener("click", submitQuery);
    document.getElementById("btnLogin").addEventListener("click", ()=>handleLogin(false));
    document.getElementById("btnRegister").addEventListener("click", ()=>handleLogin(true));
    document.getElementById("btnCopyAnswer").addEventListener("click", copyAnswer);
    document.getElementById("btnCopyCitations").addEventListener("click", copyCitations);
  </script>
</body>
</html>
